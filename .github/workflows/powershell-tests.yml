name: PowerShell tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  powershell:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run archive tests
        shell: pwsh
        run: ./powershell/tests/archive.tests.ps1
